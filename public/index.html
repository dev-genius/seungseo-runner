<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>달려라 승서! 🏃‍♀️</title>
<style>
  :root{
    --sky1:#5ec8f2;
    --sky2:#bfeafd;
    --grass1:#8fd45c;
    --grass2:#5fae3a;
    --accent:#ff6f61;
    --accent2:#ffd166;
    --navy:#4a5c8a;
    --navy-dark:#33406b;
    --panel:#ffffff;
    --text:#33302a;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0; padding:0;
    height:100%; height:100dvh;
    width:100%;
    font-family:"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    background:linear-gradient(180deg,var(--sky1),var(--sky2));
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
    overscroll-behavior:none;
    touch-action:manipulation;
    -webkit-user-select:none; user-select:none;
    -webkit-touch-callout:none;
    color:var(--text);
    position:fixed; inset:0;
  }
  #stage{
    position:relative;
    width:min(96vw, 900px, 173vh);
    aspect-ratio:9/5;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 12px 30px rgba(0,0,0,0.25);
    border:6px solid #fff;
    touch-action:none;
    container-type:size;
    container-name:stage;
  }
  canvas{
    display:block;
    width:100%; height:100%;
    background:linear-gradient(180deg,var(--sky1) 0%, var(--sky2) 75%);
  }
  .overlay{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    background:rgba(20,20,30,0.55);
    color:#fff; text-align:center;
    padding:14px;
    overflow-y:auto;
    touch-action:pan-y;
    -webkit-overflow-scrolling:touch;
  }
  .overlayInner{
    display:flex; flex-direction:column; align-items:center;
    gap:clamp(4px,2cqh,10px);
    margin:auto 0;
    max-width:100%;
    width:100%;
  }
  .hidden{ display:none !important; }
  h1{ font-size:clamp(18px,11cqh,36px); margin:0; text-shadow:2px 2px 0 rgba(0,0,0,0.2); }
  p{ font-size:clamp(11px,6cqh,17px); margin:0; line-height:1.3; }
  .bigbtn{
    font-size:clamp(13px,7cqh,21px);
    font-weight:800;
    padding:clamp(6px,3.5cqh,13px) 22px;
    border:none;
    border-radius:999px;
    background:var(--accent);
    color:#fff;
    cursor:pointer;
    box-shadow:0 6px 0 #c9463a;
    transition:transform .05s;
  }
  .bigbtn:active{ transform:translateY(4px); box-shadow:0 2px 0 #c9463a; }
  .bigbtn.alt{ background:var(--navy); box-shadow:0 6px 0 var(--navy-dark); }
  .bigbtn.alt:active{ box-shadow:0 2px 0 var(--navy-dark); }
  .btnRow{ display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
  #hud{
    position:absolute; top:10px; left:10px; right:10px;
    display:flex; justify-content:space-between; align-items:center;
    font-weight:800; font-size:clamp(14px,3vw,20px);
    color:#3a3a3a;
    pointer-events:none;
    text-shadow:1px 1px 0 rgba(255,255,255,0.7);
  }
  #hearts span{ margin-left:4px; }
  #quizOverlay{
    background:rgba(255,255,255,0.97);
    color:var(--text);
  }
  #quizCategory{
    font-size:clamp(10px,5.5cqh,15px);
    font-weight:800;
    color:#fff;
    background:var(--navy);
    padding:clamp(2px,1.2cqh,4px) 12px;
    border-radius:999px;
  }
  #quizQuestion{
    font-size:clamp(14px,11cqh,34px);
    font-weight:900;
    background:var(--accent2);
    padding:clamp(4px,3cqh,10px) 16px;
    border-radius:16px;
    box-shadow:0 4px 0 rgba(0,0,0,0.1);
    max-width:92%;
  }
  #quizSub{ font-size:clamp(9px,5cqh,15px); color:#666; }
  #quizTimerRow{ display:flex; align-items:center; gap:8px; width:min(90%,480px); }
  #quizTimerWrap{
    flex:1; height:clamp(5px,3cqh,9px); background:#e9e9e9; border-radius:999px; overflow:hidden;
  }
  #quizTimerBar{
    height:100%; width:100%;
    background:linear-gradient(90deg,#6fcf97,#f2c94c,#eb5757);
    transition:width .1s linear;
  }
  #quizTimerNum{ font-weight:900; font-size:clamp(10px,5cqh,15px); color:#555; min-width:18px; }
  #quizChoices{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:clamp(4px,3cqh,12px);
    width:min(90%,480px);
  }
  .choiceBtn{
    font-size:clamp(12px,7cqh,19px);
    font-weight:800;
    padding:clamp(5px,3.5cqh,14px) 8px;
    border-radius:14px;
    border:3px solid #ddd;
    background:#fff;
    color:var(--text);
    cursor:pointer;
    transition:transform .05s, background .15s, border-color .15s;
  }
  .choiceBtn:active{ transform:scale(0.96); }
  .choiceBtn.correct{ background:#b7f7c0; border-color:#3fbf5c; }
  .choiceBtn.wrong{ background:#ffc2c2; border-color:#e04b4b; }
  #toast{
    position:absolute; top:16%; left:50%; transform:translateX(-50%);
    font-size:clamp(18px,4.5vw,28px); font-weight:900;
    padding:10px 24px; border-radius:14px;
    background:rgba(0,0,0,0.75); color:#fff;
    pointer-events:none; opacity:0; transition:opacity .2s;
    white-space:nowrap; z-index:5;
  }
  #toast.show{ opacity:1; }
  #keyhint{ font-size:11px; opacity:0.85; }
  #rotateHint{
    position:fixed; top:10px; left:50%; transform:translateX(-50%);
    background:rgba(0,0,0,0.7); color:#fff;
    font-size:13px; font-weight:700;
    padding:8px 16px; border-radius:999px;
    z-index:20; white-space:nowrap;
    display:none;
  }
  @media (orientation:portrait) and (max-width:600px){
    #rotateHint.show{ display:block; }
  }
  @container stage (max-height:260px){
    #quizSub, #keyhint{ display:none; }
  }

  /* leaderboard */
  .lbTable{
    width:min(92%,420px); max-height:38vh; overflow-y:auto;
    display:flex; flex-direction:column; gap:5px;
  }
  .lbRow{
    display:grid; grid-template-columns:34px 1fr 76px; align-items:center;
    background:rgba(255,255,255,0.92); color:var(--text);
    border-radius:10px; padding:7px 12px; font-weight:700;
    font-size:clamp(13px,2.6vw,16px);
  }
  .lbRow.lbRowMe{ background:#fff3b0; border:2px solid #f2c94c; }
  .lbRank{ font-weight:900; color:#888; }
  .lbName{ text-align:left; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; padding:0 6px; }
  .lbScore{ text-align:right; color:#c9463a; }
  #nameEntryRow{ display:flex; gap:8px; align-items:center; }
  #nameInput{
    font-size:15px; padding:10px 14px; border-radius:999px;
    border:none; width:170px; text-align:center; font-weight:700;
  }
</style>
</head>
<body>
<div id="rotateHint">📱 가로로 돌리면 더 크게 즐길 수 있어요!</div>
<div id="stage">
  <canvas id="game"></canvas>

  <div id="hud" class="hidden">
    <div id="scoreBox">거리: <span id="scoreVal">0</span>m</div>
    <div id="hearts">❤️❤️❤️</div>
  </div>

  <div id="toast"></div>

  <div id="startScreen" class="overlay">
   <div class="overlayInner">
    <h1>🌞 달려라 승서! 🌞</h1>
    <p>스페이스바 또는 화면을 눌러서 점프하고<br>장애물을 피해요!<br>가끔 멈춰서 영어·수학·국어 문제를 10초 안에 맞춰야 해요.<br>틀리면 하트가 줄고, 맞히면 거리가 늘어나요!</p>
    <div class="btnRow">
      <button class="bigbtn" id="startBtn">시작하기</button>
      <button class="bigbtn alt" id="leaderboardBtn">🏆 리더보드</button>
    </div>
    <p id="keyhint">PC: 스페이스바 / 위쪽 화살표 = 점프</p>
   </div>
  </div>

  <div id="quizOverlay" class="overlay hidden">
   <div class="overlayInner">
    <div id="quizCategory">문제</div>
    <p id="quizSub">문제를 맞추면 다시 달릴 수 있어요!</p>
    <div id="quizQuestion">?</div>
    <div id="quizTimerRow">
      <div id="quizTimerWrap"><div id="quizTimerBar"></div></div>
      <div id="quizTimerNum">10</div>
    </div>
    <div id="quizChoices"></div>
   </div>
  </div>

  <div id="gameOverScreen" class="overlay hidden">
   <div class="overlayInner">
    <h1>게임 끝! 💥</h1>
    <p>이번 거리: <span id="finalScore">0</span>m &nbsp; | &nbsp; 최고 기록: <span id="bestScore">0</span>m</p>
    <div id="nameEntryRow" class="hidden">
      <input id="nameInput" maxlength="10" placeholder="이름을 입력하세요">
      <button class="bigbtn" id="saveScoreBtn" style="padding:10px 20px;">저장</button>
    </div>
    <div id="lbGameOverList"></div>
    <div class="btnRow">
      <button class="bigbtn" id="restartBtn">다시 하기</button>
    </div>
   </div>
  </div>

  <div id="leaderboardOverlay" class="overlay hidden">
   <div class="overlayInner">
    <h1>🏆 리더보드</h1>
    <div id="lbStartList"></div>
    <button class="bigbtn alt" id="closeLeaderboardBtn">닫기</button>
   </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import {
  getFirestore, collection, addDoc, getDocs, query, orderBy, limit, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAIbP5ccW8QDxcoqtTMjn7Qy0eTQiWyRBo",
  authDomain: "catch-game-9ed27.firebaseapp.com",
  projectId: "catch-game-9ed27",
  storageBucket: "catch-game-9ed27.firebasestorage.app",
  messagingSenderId: "1070651290489",
  appId: "1:1070651290489:web:fb160814b7b469fa86b5a8"
};
const firebaseApp = initializeApp(firebaseConfig);
const db = getFirestore(firebaseApp);
const LB_COLLECTION_PATH = 'leaderboards/seungseo-runner/entries';

(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const stage = document.getElementById('stage');
  const rotateHint = document.getElementById('rotateHint');
  rotateHint.classList.add('show');
  setTimeout(()=>rotateHint.classList.remove('show'), 4000);
  rotateHint.addEventListener('click', ()=>rotateHint.classList.remove('show'));

  const hud = document.getElementById('hud');
  const scoreVal = document.getElementById('scoreVal');
  const heartsEl = document.getElementById('hearts');
  const toastEl = document.getElementById('toast');

  const startScreen = document.getElementById('startScreen');
  const startBtn = document.getElementById('startBtn');
  const leaderboardBtn = document.getElementById('leaderboardBtn');

  const quizOverlay = document.getElementById('quizOverlay');
  const quizCategory = document.getElementById('quizCategory');
  const quizSub = document.getElementById('quizSub');
  const quizQuestion = document.getElementById('quizQuestion');
  const quizChoices = document.getElementById('quizChoices');
  const quizTimerBar = document.getElementById('quizTimerBar');
  const quizTimerNum = document.getElementById('quizTimerNum');

  const gameOverScreen = document.getElementById('gameOverScreen');
  const finalScoreEl = document.getElementById('finalScore');
  const bestScoreEl = document.getElementById('bestScore');
  const restartBtn = document.getElementById('restartBtn');
  const nameEntryRow = document.getElementById('nameEntryRow');
  const nameInput = document.getElementById('nameInput');
  const saveScoreBtn = document.getElementById('saveScoreBtn');
  const lbGameOverList = document.getElementById('lbGameOverList');

  const leaderboardOverlay = document.getElementById('leaderboardOverlay');
  const lbStartList = document.getElementById('lbStartList');
  const closeLeaderboardBtn = document.getElementById('closeLeaderboardBtn');

  // ---- canvas sizing ----
  const BASE_W = 900, BASE_H = 500;
  function resize(){
    canvas.width = BASE_W;
    canvas.height = BASE_H;
  }
  resize();
  window.addEventListener('resize', resize);

  const GROUND_Y = BASE_H - 90;

  const faceImg = new Image();
  let faceImgReady = false;
  faceImg.onload = ()=>{ faceImgReady = true; };
  faceImg.src = 'assets/face.png';

  function rand(min,max){ min=Math.ceil(min); max=Math.floor(max); return Math.floor(Math.random()*(max-min+1))+min; }
  function shuffle(arr){
    const a = arr.slice();
    for(let i=a.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [a[i],a[j]]=[a[j],a[i]];
    }
    return a;
  }
  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // ---- quiz banks ----
  // English: middle/high-school level vocabulary
  const EN_BANK = [
    ["풍부한","Abundant"],["세심한, 꼼꼼한","Meticulous"],["임의의, 제멋대로인","Arbitrary"],
    ["부지런한","Diligent"],["불가피한","Inevitable"],["애매모호한","Ambiguous"],
    ["그럴듯한","Plausible"],["악명 높은","Notorious"],["자애로운, 인자한","Benevolent"],
    ["솔직한","Candid"],["지루한","Tedious"],["웅변적인, 유창한","Eloquent"],
    ["실현 가능한","Feasible"],["적대적인","Hostile"],["거대한","Immense"],
    ["기뻐하는","Jubilant"],["수익성이 좋은","Lucrative"],["평범한, 세속적인","Mundane"],
    ["초보자","Novice"],["구식의, 쓸모없는","Obsolete"],["실용적인","Pragmatic"],
    ["예스러운, 진기한","Quaint"],["회복력 있는","Resilient"],["부족한, 희소한","Scarce"],
    ["평온한","Tranquil"],["만장일치의","Unanimous"],["생생한","Vivid"],
    ["경계하는, 조심스러운","Wary"],["열성적인","Zealous"],["포괄적인","Comprehensive"],
    ["거만한","Arrogant"],["일관성 있는","Coherent"],["악화되다","Deteriorate"],
    ["향상시키다","Enhance"],["변동하다","Fluctuate"],["편입시키다, 포함하다","Incorporate"],
    ["정당화하다","Justify"],["규모, 중요도","Magnitude"],["협상하다","Negotiate"],
    ["압도하다","Overwhelm"],["끈질긴, 집요한","Persistent"],["마지못한","Reluctant"],
    ["상당한","Substantial"],["철저한","Thorough"],["약화시키다","Undermine"],
    ["다재다능한","Versatile"]
  ];

  // Korean idioms (사자성어) / proverbs (속담): [정의, 정답]
  const KR_BANK = [
    ["매우 위급하고 위태로운 상황","풍전등화"],
    ["아무리 힘들어도 꾸준히 노력하면 결국 이룬다","우공이산"],
    ["서로 도와 이익을 나눔","상부상조"],
    ["겉과 속이 서로 다름","표리부동"],
    ["한 가지 일로 두 가지 이익을 얻음","일석이조"],
    ["매우 심각하고 위태로운 순간","일촉즉발"],
    ["몹시 놀라 넋을 잃음","혼비백산"],
    ["말과 행동이 하나로 들어맞음","언행일치"],
    ["시작은 거창하나 끝이 흐지부지함","용두사미"],
    ["갖은 애를 써서 노력함","각고면려"],
    ["여러 사람의 말이 한결같음","이구동성"],
    ["세상의 온갖 고생을 다 겪음","산전수전"],
    ["고생 끝에 즐거움이 옴","고진감래"],
    ["훌륭한 사람 밑에서 훌륭한 인재가 나옴","청출어람"],
    ["실패를 딛고 다시 일어섬","칠전팔기"],
    ["아무리 익숙한 사람도 실수할 때가 있다","원숭이도 나무에서 떨어진다"],
    ["말을 조심해야 한다, 소문은 빨리 퍼진다","발 없는 말이 천리 간다"],
    ["작은 노력도 꾸준히 하면 큰 결과를 만든다","낙숫물이 바위를 뚫는다"],
    ["일이 이미 벌어진 뒤 대비해도 소용없다","소 잃고 외양간 고친다"],
    ["급할수록 침착하게 순서를 지켜야 한다","급할수록 돌아가라"],
    ["쉬운 일도 힘을 합치면 더 쉬워진다","백지장도 맞들면 낫다"],
    ["잘 될 사람은 어려서부터 남다른 데가 있다","될성부른 나무는 떡잎부터 알아본다"],
    ["내가 잘해야 남도 나에게 잘한다","가는 말이 고와야 오는 말이 곱다"],
    ["아무리 좋은 것도 쓸모 있게 다듬어야 값어치가 있다","구슬이 서 말이라도 꿰어야 보배"]
  ];

  function makeWordQuiz(){
    const idx = Math.floor(Math.random()*EN_BANK.length);
    const [kr, en] = EN_BANK[idx];
    const wrongPool = EN_BANK.filter((_,i)=>i!==idx).map(w=>w[1]);
    const wrongs = shuffle(wrongPool).slice(0,3);
    const options = shuffle([en, ...wrongs]);
    return { question: kr, answer: en, options };
  }

  function makeKoreanQuiz(){
    const idx = Math.floor(Math.random()*KR_BANK.length);
    const [def, ans] = KR_BANK[idx];
    const wrongPool = KR_BANK.filter((_,i)=>i!==idx).map(w=>w[1]);
    const wrongs = shuffle(wrongPool).slice(0,3);
    const options = shuffle([ans, ...wrongs]);
    return { question: def, answer: ans, options };
  }

  function makeMathQuiz(tier){
    const ops = ['+','-','×','÷'];
    const op = ops[Math.floor(Math.random()*ops.length)];
    const range = 12 + tier*8;
    let a,b,answer;
    if(op === '+'){
      a = rand(1,range); b = rand(1,range); answer = a+b;
    } else if(op === '-'){
      a = rand(Math.max(2,Math.floor(range/2)), range+10); b = rand(1,a); answer = a-b;
    } else if(op === '×'){
      a = rand(2, 9+Math.min(tier,4)); b = rand(2, 12+tier*2); answer = a*b;
    } else {
      b = rand(2, 9+Math.min(tier,3));
      const q = rand(2, 12+tier*2);
      a = b*q; answer = q;
    }
    const question = `${a} ${op} ${b} = ?`;
    const wrongsSet = new Set();
    let guard = 0;
    while(wrongsSet.size < 3 && guard < 50){
      guard++;
      const delta = rand(-6,6) || 3;
      const w = answer + delta;
      if(w !== answer && w >= 0) wrongsSet.add(w);
    }
    const options = shuffle([answer, ...wrongsSet]).map(String);
    return { question, answer:String(answer), options };
  }

  // ---- leaderboard (Firestore, shared across every device) ----
  async function fetchLeaderboard(){
    const q = query(collection(db, LB_COLLECTION_PATH), orderBy('score','desc'), limit(10));
    const snap = await getDocs(q);
    return snap.docs.map(d=>({ id:d.id, name:d.data().name, score:d.data().score }));
  }
  async function addToLeaderboard(name, score){
    const docRef = await addDoc(collection(db, LB_COLLECTION_PATH), {
      name: (name||'승서').slice(0,10),
      score,
      ts: serverTimestamp()
    });
    return docRef.id;
  }
  function renderLeaderboardList(container, list, highlightId){
    container.innerHTML = '';
    if(!list){
      container.innerHTML = '<p style="opacity:.85">리더보드를 불러오지 못했어요. 인터넷 연결을 확인해주세요.</p>';
      return;
    }
    if(list.length === 0){
      container.innerHTML = '<p style="opacity:.85">아직 기록이 없어요. 첫 기록의 주인공이 되어보세요!</p>';
      return;
    }
    const table = document.createElement('div');
    table.className = 'lbTable';
    list.forEach((e,i)=>{
      const row = document.createElement('div');
      row.className = 'lbRow' + (e.id === highlightId ? ' lbRowMe' : '');

  // ---- game state ----
  let state = 'ready'; // ready, running, quiz, gameover

  const GRAVITY = 2300;
  const JUMP_V = -860;

  const PLAYER_W = 68, PLAYER_H = 108;

  function resetGame(){
    player = { x:120, y:GROUND_Y, w:PLAYER_W, h:PLAYER_H, vy:0, onGround:true, runPhase:0 };

  function showToast(msg, ms=1100){

  // ---- quiz flow ----
  let quizCount = 0;

  const QUIZ_TYPES = ['en','math','kr'];
  const QUIZ_MS = 10000;

  function triggerQuiz(){
    state = 'quiz';
    const type = QUIZ_TYPES[quizCount % QUIZ_TYPES.length];
    quizCount++;
    const tier = Math.min(Math.floor(distance/400), 5);
    let q, label, sub;
    if(type === 'en'){
      q = makeWordQuiz();
      label = '🔤 영어';
      sub = '이 뜻을 가진 영어 단어를 골라보세요!';
    } else if(type === 'kr'){
      q = makeKoreanQuiz();
      label = '📖 국어';
      sub = '이 뜻에 맞는 사자성어·속담을 골라보세요!';
    } else {
      q = makeMathQuiz(tier);
      label = '➗ 수학';
      sub = '계산 문제를 풀어보세요!';
    }
    quizCategory.textContent = label;
    quizSub.textContent = sub;
    quizQuestion.textContent = q.question;
    quizChoices.innerHTML = '';
    quizAnswered = false;
    quizDeadline = performance.now() + QUIZ_MS;
    quizTimerBar.style.width = '100%';
    quizTimerNum.textContent = '10';

    q.options.forEach((opt)=>{
      const btn = document.createElement('button');
      btn.className = 'choiceBtn';
      btn.textContent = opt;
      btn.addEventListener('click', ()=> handleAnswer(opt, q.answer, btn));
      quizChoices.appendChild(btn);
    });
    quizOverlay.classList.remove('hidden');

  function handleAnswer(opt, correctAnswer, btnEl){
    if(quizAnswered) return;
    quizAnswered = true;
    const buttons = quizChoices.querySelectorAll('.choiceBtn');
    buttons.forEach(b=>b.disabled = true);

    if(opt === correctAnswer){
      if(btnEl) btnEl.classList.add('correct');
      showToast('정답이에요! 🎉 +40m', 900);
      distance += 40;
      setTimeout(closeQuiz, 700);
    } else {
      if(btnEl) btnEl.classList.add('wrong');
      buttons.forEach(b=>{ if(b.textContent === correctAnswer) b.classList.add('correct'); });
      loseHeartFromQuiz();
    }
  }

  function handleQuizTimeout(){
    if(quizAnswered) return;
    quizAnswered = true;
    const buttons = quizChoices.querySelectorAll('.choiceBtn');
    buttons.forEach(b=>{
      b.disabled = true;
    });
    showToast('시간 초과! ⏰', 1200);
    loseHeartFromQuiz();

  function loseHeartFromQuiz(){
    lives--;

      showToast('괜찮아요, 다음엔 더 잘할 수 있어요!', 1200);
      setTimeout(()=>{
        quizOverlay.classList.add('hidden');
        endGame();
      }, 1300);
    } else {
      showToast('괜찮아요, 다음엔 더 잘할 수 있어요!', 1300);
      setTimeout(closeQuiz, 1300);
    }
  }

  function closeQuiz(){

    nextQuizAt = distance + 260 + Math.random()*80;

  // ---- collision ----
  function checkCollision(o){
    const px = player.x, py = player.y - player.h, pw = player.w, ph = player.h;
    const pad = 12;
    return (px+pad) < (o.x+o.w) && (px+pw-pad) > o.x &&
           (py+pad) < (o.y+o.h) && (py+ph-pad) > o.y;
  }

  function onHit(){
    if(invincibleTimer > 0) return;
    lives--;
    updateHearts();
    invincibleTimer = 1.5;
    if(lives <= 0){
      endGame();
    } else {
      showToast('아야! 조심해요!', 900);
    }
  }

  function endGame(){
    state = 'gameover';
    hud.classList.add('hidden');
    const finalDist = Math.floor(distance);
    if(finalDist > best){
      best = finalDist;
      localStorage.setItem('runnerBest', String(best));
    }
    finalScoreEl.textContent = finalDist;
    bestScoreEl.textContent = best;
    gameOverScreen.classList.remove('hidden');

    if(finalDist > 0){
      nameEntryRow.classList.remove('hidden');
      nameInput.value = '';
      lbGameOverList.innerHTML = '<p style="opacity:.85">불러오는 중...</p>';
      let saving = false;
      const doSave = async ()=>{
        if(saving) return;
        saving = true;
        saveScoreBtn.disabled = true;
        try{
          const id = await addToLeaderboard(nameInput.value.trim(), finalDist);
          nameEntryRow.classList.add('hidden');
          const list = await fetchLeaderboard();
          renderLeaderboardList(lbGameOverList, list, id);
        }catch(e){
          console.error(e);
          showToast('저장에 실패했어요. 다시 시도해주세요.', 1500);
          saving = false;
          saveScoreBtn.disabled = false;
        }
      };
      saveScoreBtn.onclick = doSave;
      nameInput.onkeydown = (e)=>{ if(e.key === 'Enter') doSave(); };
      fetchLeaderboard().then(list=>{
        if(!nameEntryRow.classList.contains('hidden')) renderLeaderboardList(lbGameOverList, list, null);
      }).catch(()=>{
        if(!nameEntryRow.classList.contains('hidden')) renderLeaderboardList(lbGameOverList, null, null);
      });
    } else {
      nameEntryRow.classList.add('hidden');
      fetchLeaderboard().then(list=>renderLeaderboardList(lbGameOverList, list, null))
        .catch(()=>renderLeaderboardList(lbGameOverList, null, null));

  }

  // ---- obstacles ----
  const OBSTACLE_TYPES = [
    { type:'rock', w:58, h:48 },
    { type:'tree', w:56, h:82 },
    { type:'bush', w:52, h:52 },
    { type:'gate', w:38, h:88 },
  ];
  function spawnObstacle(){
    const t = OBSTACLE_TYPES[Math.floor(Math.random()*OBSTACLE_TYPES.length)];
    obstacles.push({
      x: BASE_W + 20,
      y: GROUND_Y - t.h,
      w: t.w, h: t.h,
      type: t.type,
      variant: Math.random() < 0.5 ? 0 : 1
    });
  }

  // ---- drawing helpers ----
  function roundRectPath(x,y,w,h,r){
    if(typeof r === 'number') r = {tl:r,tr:r,br:r,bl:r};
    ctx.beginPath();
    ctx.moveTo(x+r.tl,y);
    ctx.lineTo(x+w-r.tr,y);
    ctx.arcTo(x+w,y,x+w,y+r.tr,r.tr);
    ctx.lineTo(x+w,y+h-r.br);
    ctx.arcTo(x+w,y+h,x+w-r.br,y+h,r.br);
    ctx.lineTo(x+r.bl,y+h);
    ctx.arcTo(x,y+h,x,y+h-r.bl,r.bl);
    ctx.lineTo(x,y+r.tl);
    ctx.arcTo(x,y,x+r.tl,y,r.tl);
    ctx.closePath();
  }

  // ---- background ----
  let bg1 = 0, bg2 = 0, groundScroll = 0;
  const MOUNTAIN_PERIOD = 320;
  const HILL_PERIOD = 260;

  function drawBackground(){
    // warm sun glow + disk
    const sunG = ctx.createRadialGradient(760,80,10,760,80,170);
    sunG.addColorStop(0,'rgba(255,250,210,0.95)');
    sunG.addColorStop(1,'rgba(255,250,210,0)');
    ctx.fillStyle = sunG;
    ctx.fillRect(540,-90,420,340);
    ctx.fillStyle = '#fff3b0';
    ctx.beginPath();
    ctx.arc(760,80,32,0,Math.PI*2);
    ctx.fill();

    // far rolling hills (parallax)
    ctx.fillStyle = '#bfe08a';
    for(let i=-1;i<=Math.ceil(BASE_W/MOUNTAIN_PERIOD)+1;i++){
      const baseX = i*MOUNTAIN_PERIOD - (bg1 % MOUNTAIN_PERIOD);
      ctx.beginPath();
      ctx.moveTo(baseX-30, GROUND_Y+10);
      ctx.quadraticCurveTo(baseX+MOUNTAIN_PERIOD*0.5, GROUND_Y-130, baseX+MOUNTAIN_PERIOD+30, GROUND_Y+10);
      ctx.closePath();
      ctx.fill();
    }

    // mid hills (parallax, faster, brighter green)
    ctx.fillStyle = '#9ed968';
    for(let i=-1;i<=Math.ceil(BASE_W/HILL_PERIOD)+1;i++){
      const baseX = i*HILL_PERIOD - (bg2 % HILL_PERIOD);
      ctx.beginPath();
      ctx.moveTo(baseX-20, GROUND_Y+6);
      ctx.quadraticCurveTo(baseX+HILL_PERIOD*0.5, GROUND_Y-70, baseX+HILL_PERIOD+20, GROUND_Y+6);
      ctx.closePath();
      ctx.fill();
    }

    // clouds
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    const clouds = [[130,66,28],[230,50,20],[640,58,24],[760,92,18]];
    clouds.forEach(([cx,cy,r])=>{
      const x = ((cx - bg1*0.4) % (BASE_W+200) + (BASE_W+200)) % (BASE_W+200) - 100;
      ctx.beginPath(); ctx.ellipse(x,cy,r*1.3,r*0.85,0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(x+r*0.9,cy+5,r,r*0.7,0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(x-r*0.8,cy+6,r*0.8,r*0.6,0,0,Math.PI*2); ctx.fill();
    });
  }

  function drawGround(){
    // grass band
    const g = ctx.createLinearGradient(0,GROUND_Y,0,GROUND_Y+18);
    g.addColorStop(0,'#8fd45c');
    g.addColorStop(1,'#6cba3f');
    ctx.fillStyle = g;
    ctx.fillRect(0, GROUND_Y, BASE_W, 18);
    ctx.fillStyle = '#5fae3a';
    ctx.fillRect(0, GROUND_Y, BASE_W, 4);

    // dirt running trail
    const dirtG = ctx.createLinearGradient(0,GROUND_Y+18,0,BASE_H);
    dirtG.addColorStop(0,'#e0bd82');
    dirtG.addColorStop(1,'#c9a463');
    ctx.fillStyle = dirtG;
    ctx.fillRect(0, GROUND_Y+18, BASE_W, BASE_H-GROUND_Y-18);

    // trail center dashes
    ctx.strokeStyle = 'rgba(255,255,255,0.55)';
    ctx.lineWidth = 4;
    ctx.setLineDash([28,22]);
    ctx.beginPath();
    ctx.moveTo(-groundScroll % 50, GROUND_Y+48);
    ctx.lineTo(BASE_W, GROUND_Y+48);
    ctx.stroke();
    ctx.setLineDash([]);

    // little flowers dotted along the grass edge
    const flowerColors = ['#ff6f9c','#ffd166','#ffffff'];
    for(let i=0;i<16;i++){
      const raw = i*58 - groundScroll*0.6;
      const x = ((raw % (BASE_W+58)) + (BASE_W+58)) % (BASE_W+58) - 29;
      const fy = GROUND_Y + 8 + (i%3)*3;
      ctx.fillStyle = flowerColors[i%flowerColors.length];
      for(let k=0;k<5;k++){
        const ang = (Math.PI*2/5)*k;
        ctx.beginPath();
        ctx.arc(x+Math.cos(ang)*3, fy+Math.sin(ang)*3, 2, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.fillStyle = '#ffd166';
      ctx.beginPath(); ctx.arc(x, fy, 1.4, 0, Math.PI*2); ctx.fill();
    }
  }

  // ---- player drawing (cute girl skier character) ----
  function drawPlayer(p){
    const cx = p.x + p.w/2;
    const footY = p.y;
    const H = p.h, W = p.w;
    const airborne = !p.onGround;
    const phase = p.runPhase;

    ctx.save();
    ctx.translate(cx, footY);
    if(invincibleTimer > 0 && Math.floor(invincibleTimer*10)%2===0){
      ctx.globalAlpha = 0.45;
    }

    const legSwing = airborne ? 0 : Math.sin(phase);
    const legSwing2 = airborne ? 0 : Math.sin(phase+Math.PI);
    const legLiftBase = airborne ? -H*0.16 : 0;

    // shadow
    ctx.fillStyle = 'rgba(60,70,100,0.18)';
    ctx.beginPath();
    ctx.ellipse(0, 4, W*0.42, 7, 0, 0, Math.PI*2);
    ctx.fill();

    // back leg
    drawLeg(-legSwing, legLiftBase, W, H, '#3a3f6b');
    // back arm
    drawArm(legSwing, H, W, '#3a3f6b', true);

    // torso (puffer jacket)
    const hipY = -H*0.42, shoulderY = -H*0.74;
    const torsoW = W*0.62;
    roundRectPath(-torsoW/2, shoulderY, torsoW, hipY-shoulderY, 14);
    const jacketG = ctx.createLinearGradient(0,shoulderY,0,hipY);
    jacketG.addColorStop(0,'#5c6ea0');
    jacketG.addColorStop(1,'#3f4d80');
    ctx.fillStyle = jacketG;
    ctx.fill();
    // zipper
    ctx.strokeStyle = 'rgba(255,255,255,0.35)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, shoulderY+6);
    ctx.lineTo(0, hipY-4);
    ctx.stroke();

    // scarf
    ctx.fillStyle = '#e6483c';
    ctx.beginPath();
    ctx.ellipse(0, shoulderY+4, torsoW*0.42, 9, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-torsoW*0.30, shoulderY+8);
    ctx.lineTo(-torsoW*0.55, shoulderY+30 + Math.sin(phase)*4);
    ctx.lineTo(-torsoW*0.20, shoulderY+16);
    ctx.closePath();
    ctx.fill();

    // front leg
    drawLeg(legSwing, legLiftBase, W, H, '#4a5090');
    // front arm
    drawArm(-legSwing, H, W, '#4a5090', false);

    // head group
    const headR = H*0.205;
    const headCY = shoulderY - headR*0.95;

    // ponytail (behind head)
    ctx.fillStyle = '#2b2320';
    ctx.beginPath();
    ctx.moveTo(headR*0.55, headCY-headR*0.2);
    ctx.quadraticCurveTo(headR*1.7, headCY+headR*0.5, headR*1.1, headCY+headR*1.9);
    ctx.quadraticCurveTo(headR*0.85, headCY+headR*1.3, headR*0.5, headCY+headR*0.3);
    ctx.closePath();
    ctx.fill();

    // hair behind head
    ctx.fillStyle = '#2b2320';
    ctx.beginPath();
    ctx.arc(0, headCY, headR*1.04, 0, Math.PI*2);
    ctx.fill();

    // face (real photo, clipped to a circle)
    const faceCY = headCY+headR*0.08, faceR = headR*0.93;
    ctx.save();
    ctx.beginPath();
    ctx.arc(0, faceCY, faceR, 0, Math.PI*2);
    ctx.clip();
    if(faceImgReady){
      const d = faceR*2.05;
      ctx.drawImage(faceImg, -d/2, faceCY-d/2, d, d);
    } else {
      ctx.fillStyle = '#ffe0bd';
      ctx.fillRect(-faceR, faceCY-faceR, faceR*2, faceR*2);
    }
    ctx.restore();

    // rosy cheeks
    ctx.fillStyle = 'rgba(255,140,140,0.32)';
    ctx.beginPath(); ctx.ellipse(-headR*0.5, headCY+headR*0.35, headR*0.16, headR*0.10, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(headR*0.5, headCY+headR*0.35, headR*0.16, headR*0.10, 0, 0, Math.PI*2); ctx.fill();

    ctx.restore();
  }

  function drawLeg(swing, lift, W, H, color){
    const hipY = -H*0.42;
    const legW = W*0.20;
    const legLen = H*0.40;
    const xOff = swing*W*0.16;
    const footDrop = airborneSafe(lift);
    ctx.save();
    roundRectPath(xOff-legW/2, hipY+footDrop, legW, legLen*(1-Math.abs(swing)*0.12), legW*0.45);
    ctx.fillStyle = color;
    ctx.fill();
    // boot
    const bootY = hipY+footDrop+legLen*(1-Math.abs(swing)*0.12);
    roundRectPath(xOff-legW*0.6, bootY-4, legW*1.2, legW*0.9, 4);
    ctx.fillStyle = '#232323';
    ctx.fill();
    ctx.restore();
  }
  function airborneSafe(v){ return v; }

  function drawArm(swing, H, W, color, isBack){
    const shoulderY = -H*0.72;
    const armLen = H*0.30;
    const xOff = swing*W*0.14 + (isBack? -W*0.02 : W*0.02);
    ctx.save();
    ctx.strokeStyle = color;
    ctx.lineWidth = W*0.14;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(isBack? -W*0.24 : W*0.24, shoulderY+H*0.05);
    ctx.lineTo(xOff*1.3 + (isBack? -W*0.1 : W*0.1), shoulderY+armLen);
    ctx.stroke();
    // mitten
    ctx.fillStyle = '#e6483c';
    ctx.beginPath();
    ctx.arc(xOff*1.3 + (isBack? -W*0.1 : W*0.1), shoulderY+armLen, W*0.09, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  // ---- obstacle drawing ----
  function drawObstacle(o){
    const x = o.x, yTop = o.y, w = o.w, h = o.h;
    ctx.save();
    // ground shadow
    ctx.fillStyle = 'rgba(60,70,100,0.15)';
    ctx.beginPath();
    ctx.ellipse(x+w/2, yTop+h+2, w*0.45, 7, 0, 0, Math.PI*2);
    ctx.fill();

    if(o.type === 'rock'){
      const g = ctx.createLinearGradient(x,yTop,x,yTop+h);
      g.addColorStop(0,'#b3ac9c');
      g.addColorStop(1,'#7d7666');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.moveTo(x+w*0.05, yTop+h);
      ctx.lineTo(x, yTop+h*0.55);
      ctx.lineTo(x+w*0.22, yTop+h*0.18);
      ctx.lineTo(x+w*0.55, yTop);
      ctx.lineTo(x+w*0.85, yTop+h*0.22);
      ctx.lineTo(x+w, yTop+h*0.6);
      ctx.lineTo(x+w*0.95, yTop+h);
      ctx.closePath();
      ctx.fill();
      // grass tufts at the base
      ctx.strokeStyle = '#5fae3a';
      ctx.lineWidth = 3;
      ctx.lineCap = 'round';
      for(let k=0;k<4;k++){
        const gx = x + w*(0.08+k*0.24);
        ctx.beginPath();
        ctx.moveTo(gx, yTop+h);
        ctx.quadraticCurveTo(gx-4, yTop+h-13, gx-2, yTop+h-17);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(gx+5, yTop+h);
        ctx.quadraticCurveTo(gx+7, yTop+h-11, gx+9, yTop+h-15);
        ctx.stroke();
      }
    }
    else if(o.type === 'tree'){
      const trunkW = w*0.16;
      ctx.fillStyle = '#8a6d3b';
      ctx.fillRect(x+w/2-trunkW/2, yTop+h*0.55, trunkW, h*0.45);
      const canopyCY = yTop+h*0.36;
      const blobs = [
        [0, 0, w*0.5],
        [-w*0.3, h*0.08, w*0.36],
        [w*0.3, h*0.08, w*0.36],
        [0, -h*0.16, w*0.4],
      ];
      blobs.forEach(([dx,dy,r])=>{
        const g = ctx.createRadialGradient(x+w/2+dx-r*0.3, canopyCY+dy-r*0.3, r*0.2, x+w/2+dx, canopyCY+dy, r);
        g.addColorStop(0,'#75c95a');
        g.addColorStop(1,'#3f8f3a');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(x+w/2+dx, canopyCY+dy, r, 0, Math.PI*2);
        ctx.fill();
      });
      // little fruit dots
      ctx.fillStyle = '#e6483c';
      for(let k=0;k<3;k++){
        const fx = x+w/2 + (k-1)*w*0.24;
        const fy = canopyCY + h*0.12 + (k%2)*6;
        ctx.beginPath(); ctx.arc(fx, fy, 3.4, 0, Math.PI*2); ctx.fill();
      }
    }
    else if(o.type === 'bush'){
      const cx = x+w/2, baseCY = yTop+h*0.78;
      const blobs = [
        [0, 0, w*0.5],
        [-w*0.32, h*0.02, w*0.34],
        [w*0.32, h*0.02, w*0.34],
        [0, -h*0.24, w*0.36],
      ];
      blobs.forEach(([dx,dy,r])=>{
        const g = ctx.createRadialGradient(cx+dx-r*0.3, baseCY+dy-r*0.3, r*0.2, cx+dx, baseCY+dy, r);
        g.addColorStop(0,'#82d35c');
        g.addColorStop(1,'#4a9a3a');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(cx+dx, baseCY+dy, r, 0, Math.PI*2);
        ctx.fill();
      });
      // little flowers
      const dotColor = o.variant ? '#ff6f9c' : '#ffd166';
      for(let k=0;k<5;k++){
        const ang = (Math.PI*2/5)*k + (o.variant?0.3:0);
        const fx = cx + Math.cos(ang)*w*0.32;
        const fy = baseCY - h*0.12 + Math.sin(ang)*h*0.2;
        ctx.fillStyle = dotColor;
        ctx.beginPath(); ctx.arc(fx, fy, 3, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(fx, fy, 1.1, 0, Math.PI*2); ctx.fill();
      }
    }
    else if(o.type === 'gate'){
      const flutter = Math.sin(groundScroll*0.06 + x*0.02)*4;
      const flagColor = o.variant ? '#e6483c' : '#3468c9';
      ctx.fillStyle = '#8a6d3b';
      ctx.fillRect(x+w*0.42, yTop, w*0.16, h);
      ctx.fillStyle = flagColor;
      ctx.beginPath();
      ctx.moveTo(x+w*0.58, yTop+h*0.08);
      ctx.lineTo(x+w*1.05+flutter, yTop+h*0.16);
      ctx.lineTo(x+w*0.58, yTop+h*0.30);
      ctx.closePath();
      ctx.fill();
    }

    ctx.restore();
  }

  // ---- main loop ----
  function loop(now){
    const dt = Math.min((now - lastTime)/1000, 0.033);
    lastTime = now;

    if(state === 'running'){
      // physics
      player.vy += GRAVITY*dt;
      player.y += player.vy*dt;
      if(player.y >= GROUND_Y){
        player.y = GROUND_Y;
        player.vy = 0;
        player.onGround = true;
      }

      // speed ramp
      speed = 320 + Math.min(distance/8, 260);
      distance += speed*dt/10;
      groundScroll += speed*dt;
      bg1 += speed*dt*0.18;
      bg2 += speed*dt*0.38;
      player.runPhase += dt * (7 + speed/90);

      // spawn
      spawnTimer -= dt*1000;
      if(spawnTimer <= 0){
        spawnObstacle();
        spawnTimer = randSpawnGap() * (1 - Math.min(distance/4500,0.35));
      }

      // move obstacles
      obstacles.forEach(o=> o.x -= speed*dt);
      obstacles = obstacles.filter(o=> o.x + o.w > -20);

      if(invincibleTimer > 0) invincibleTimer -= dt;

      // collisions
      if(invincibleTimer <= 0){
        for(const o of obstacles){
          if(checkCollision(o)){
            onHit();
            break;
          }
        }
      }

      scoreVal.textContent = Math.floor(distance);

      if(distance >= nextQuizAt && state === 'running' && player.onGround){
        triggerQuiz();
      }
    }
    else if(state === 'quiz'){
      const remain = Math.max(0, quizDeadline - now);
      const pct = Math.max(0, Math.min(1, remain/QUIZ_MS));
      quizTimerBar.style.width = (pct*100)+'%';
      quizTimerNum.textContent = String(Math.ceil(remain/1000));
      if(remain <= 0 && !quizAnswered){
        handleQuizTimeout();
      }
    }

    draw();

    if(state !== 'gameover'){
      requestAnimationFrame(loop);
    }
  }

  function draw(){
    ctx.clearRect(0,0,BASE_W,BASE_H);
    drawBackground();
    drawGround();
    obstacles.forEach(drawObstacle);
    drawPlayer(player);
  }

  // initial idle draw
  player = { x:120, y:GROUND_Y, w:PLAYER_W, h:PLAYER_H, vy:0, onGround:true, runPhase:0 };
  obstacles = [];
  draw();
})();
</script>
