<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>달려라 승서! 🏃</title>
<style>
  :root{
    --sky1:#8ed1fc;
    --sky2:#c9f0ff;
    --ground1:#8bc34a;
    --ground2:#6fa83a;
    --accent:#ff6f61;
    --accent2:#ffd166;
    --panel:#ffffff;
    --text:#33302a;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0; padding:0;
    height:100%; height:100dvh;
    width:100%;
    font-family:"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    background:linear-gradient(180deg,var(--sky1),var(--sky2));
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
    overscroll-behavior:none;
    touch-action:manipulation;
    -webkit-user-select:none; user-select:none;
    -webkit-touch-callout:none;
    color:var(--text);
    position:fixed; inset:0;
  }
  #stage{
    position:relative;
    width:min(96vw, 900px, 173vh);
    aspect-ratio:9/5;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 12px 30px rgba(0,0,0,0.25);
    border:6px solid #fff;
    touch-action:none;
  }
  canvas{
    display:block;
    width:100%; height:100%;
    background:linear-gradient(180deg,var(--sky1) 0%, var(--sky2) 70%);
  }
  .overlay{
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:16px;
    background:rgba(20,20,30,0.55);
    color:#fff; text-align:center;
    padding:20px;
  }
  .hidden{ display:none !important; }
  h1{ font-size:clamp(22px,5vw,38px); margin:0; text-shadow:2px 2px 0 rgba(0,0,0,0.2); }
  p{ font-size:clamp(14px,2.6vw,18px); margin:0; line-height:1.5; }
  .bigbtn{
    font-size:clamp(16px,3vw,22px);
    font-weight:800;
    padding:14px 32px;
    border:none;
    border-radius:999px;
    background:var(--accent);
    color:#fff;
    cursor:pointer;
    box-shadow:0 6px 0 #c9463a;
    transition:transform .05s;
  }
  .bigbtn:active{ transform:translateY(4px); box-shadow:0 2px 0 #c9463a; }
  #hud{
    position:absolute; top:10px; left:10px; right:10px;
    display:flex; justify-content:space-between; align-items:center;
    font-weight:800; font-size:clamp(14px,3vw,20px);
    color:#3a3a3a;
    pointer-events:none;
    text-shadow:1px 1px 0 rgba(255,255,255,0.6);
  }
  #hearts span{ margin-left:4px; }
  #quizOverlay{
    background:rgba(255,255,255,0.97);
    color:var(--text);
  }
  #quizQuestion{
    font-size:clamp(24px,6vw,42px);
    font-weight:900;
    background:var(--accent2);
    padding:10px 26px;
    border-radius:16px;
    box-shadow:0 4px 0 rgba(0,0,0,0.1);
  }
  #quizSub{ font-size:clamp(13px,2.5vw,16px); color:#666; }
  #quizChoices{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    width:min(90%,480px);
  }
  .choiceBtn{
    font-size:clamp(15px,3vw,20px);
    font-weight:800;
    padding:16px 10px;
    border-radius:14px;
    border:3px solid #ddd;
    background:#fff;
    color:var(--text);
    cursor:pointer;
    transition:transform .05s, background .15s, border-color .15s;
  }
  .choiceBtn:active{ transform:scale(0.96); }
  .choiceBtn.correct{ background:#b7f7c0; border-color:#3fbf5c; }
  .choiceBtn.wrong{ background:#ffc2c2; border-color:#e04b4b; }
  #toast{
    position:absolute; top:18%; left:50%; transform:translateX(-50%);
    font-size:clamp(20px,5vw,30px); font-weight:900;
    padding:10px 24px; border-radius:14px;
    background:rgba(0,0,0,0.75); color:#fff;
    pointer-events:none; opacity:0; transition:opacity .2s;
  }
  #toast.show{ opacity:1; }
  #keyhint{ font-size:12px; opacity:0.85; }
  #rotateHint{
    position:fixed; top:10px; left:50%; transform:translateX(-50%);
    background:rgba(0,0,0,0.7); color:#fff;
    font-size:13px; font-weight:700;
    padding:8px 16px; border-radius:999px;
    z-index:20; white-space:nowrap;
    display:none;
  }
  @media (orientation:portrait) and (max-width:600px){
    #rotateHint.show{ display:block; }
  }
</style>
</head>
<body>
<div id="rotateHint">📱 가로로 돌리면 더 크게 즐길 수 있어요!</div>
<div id="stage">
  <canvas id="game"></canvas>

  <div id="hud" class="hidden">
    <div id="scoreBox">거리: <span id="scoreVal">0</span>m</div>
    <div id="hearts">❤️❤️❤️</div>
  </div>

  <div id="toast"></div>

  <div id="startScreen" class="overlay">
    <h1>🏃 달려라 승서! 🏃</h1>
    <p>스페이스바 또는 화면을 눌러서 점프하고<br>장애물을 피해요!<br>가끔 멈춰서 영어 단어랑 수학 문제를 맞춰야 해요.</p>
    <button class="bigbtn" id="startBtn">시작하기</button>
    <p id="keyhint">PC: 스페이스바 / 위쪽 화살표 = 점프</p>
  </div>

  <div id="quizOverlay" class="overlay hidden">
    <p id="quizSub">문제를 맞추면 다시 달릴 수 있어요!</p>
    <div id="quizQuestion">?</div>
    <div id="quizChoices"></div>
  </div>

  <div id="gameOverScreen" class="overlay hidden">
    <h1>게임 끝! 💥</h1>
    <p>이번 거리: <span id="finalScore">0</span>m &nbsp; | &nbsp; 최고 기록: <span id="bestScore">0</span>m</p>
    <button class="bigbtn" id="restartBtn">다시 하기</button>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const stage = document.getElementById('stage');
  const rotateHint = document.getElementById('rotateHint');
  rotateHint.classList.add('show');
  setTimeout(()=>rotateHint.classList.remove('show'), 4000);
  rotateHint.addEventListener('click', ()=>rotateHint.classList.remove('show'));

  const hud = document.getElementById('hud');
  const scoreVal = document.getElementById('scoreVal');
  const heartsEl = document.getElementById('hearts');
  const toastEl = document.getElementById('toast');

  const startScreen = document.getElementById('startScreen');
  const startBtn = document.getElementById('startBtn');

  const quizOverlay = document.getElementById('quizOverlay');
  const quizQuestion = document.getElementById('quizQuestion');
  const quizChoices = document.getElementById('quizChoices');

  const gameOverScreen = document.getElementById('gameOverScreen');
  const finalScoreEl = document.getElementById('finalScore');
  const bestScoreEl = document.getElementById('bestScore');
  const restartBtn = document.getElementById('restartBtn');

  // ---- canvas sizing ----
  const BASE_W = 900, BASE_H = 500;
  function resize(){
    const rect = stage.getBoundingClientRect();
    canvas.width = BASE_W;
    canvas.height = BASE_H;
  }
  resize();
  window.addEventListener('resize', resize);

  const GROUND_Y = BASE_H - 90;

  // ---- word bank (Korean meaning -> English word) ----
  const WORD_BANK = [
    ["사과","Apple"],["바나나","Banana"],["포도","Grape"],["수박","Watermelon"],
    ["딸기","Strawberry"],["오렌지","Orange"],["강아지","Dog"],["고양이","Cat"],
    ["토끼","Rabbit"],["사자","Lion"],["코끼리","Elephant"],["호랑이","Tiger"],
    ["원숭이","Monkey"],["물고기","Fish"],["새","Bird"],["빨간색","Red"],
    ["파란색","Blue"],["노란색","Yellow"],["초록색","Green"],["검은색","Black"],
    ["하얀색","White"],["학교","School"],["선생님","Teacher"],["친구","Friend"],
    ["책","Book"],["연필","Pencil"],["의자","Chair"],["창문","Window"],
    ["하늘","Sky"],["별","Star"],["달","Moon"],["해","Sun"],
    ["비","Rain"],["눈","Snow"],["여름","Summer"],["겨울","Winter"],
    ["엄마","Mother"],["아빠","Father"],["형/오빠","Brother"],["누나/언니","Sister"]
  ];

  function shuffle(arr){
    const a = arr.slice();
    for(let i=a.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [a[i],a[j]]=[a[j],a[i]];
    }
    return a;
  }

  function makeWordQuiz(){
    const idx = Math.floor(Math.random()*WORD_BANK.length);
    const [kr, en] = WORD_BANK[idx];
    const wrongPool = WORD_BANK.filter((_,i)=>i!==idx).map(w=>w[1]);
    const wrongs = shuffle(wrongPool).slice(0,3);
    const options = shuffle([en, ...wrongs]);
    return { question: kr, answer: en, options };
  }

  function makeMathQuiz(difficultyTier){
    let a,b,op,answer;
    op = Math.random() < 0.5 ? '+' : '-';
    const maxN = 10 + difficultyTier*5;
    if(op === '+'){
      a = Math.floor(Math.random()*maxN)+1;
      b = Math.floor(Math.random()*maxN)+1;
      answer = a+b;
    } else {
      a = Math.floor(Math.random()*maxN)+5;
      b = Math.floor(Math.random()*a);
      answer = a-b;
    }
    const question = `${a} ${op} ${b} = ?`;
    const wrongsSet = new Set();
    while(wrongsSet.size < 3){
      const delta = Math.floor(Math.random()*7)-3;
      const w = answer + delta;
      if(w !== answer && w >= 0) wrongsSet.add(w);
    }
    const options = shuffle([answer, ...wrongsSet]).map(String);
    return { question, answer:String(answer), options };
  }

  // ---- game state ----
  let state = 'ready'; // ready, running, quiz, gameover
  let player, obstacles, speed, distance, lives, nextQuizAt, best, invincibleTimer, lastTime;
  const GRAVITY = 2200;
  const JUMP_V = -820;
  const GROUND_FRICTION = 1;

  function resetGame(){
    player = { x:110, y:GROUND_Y, w:46, h:56, vy:0, onGround:true, blink:0 };
    obstacles = [];
    speed = 320;
    distance = 0;
    lives = 3;
    nextQuizAt = 220;
    invincibleTimer = 0;
    spawnTimer = randSpawnGap();
  }

  best = Number(localStorage.getItem('runnerBest') || 0);

  let spawnTimer = 0;
  function randSpawnGap(){
    return 900 + Math.random()*700;
  }

  function updateHearts(){
    heartsEl.textContent = '❤️'.repeat(Math.max(lives,0)) + '🖤'.repeat(Math.max(3-lives,0));
  }

  function showToast(msg, ms=1100){
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(()=>toastEl.classList.remove('show'), ms);
  }

  // ---- input ----
  function tryJump(){
    if(state !== 'running') return;
    if(player.onGround){
      player.vy = JUMP_V;
      player.onGround = false;
    }
  }

  window.addEventListener('keydown', (e)=>{
    if(e.code === 'Space' || e.code === 'ArrowUp'){
      e.preventDefault();
      tryJump();
    }
    if(state === 'quiz'){
      const n = Number(e.key);
      if(n>=1 && n<=4){
        const btns = quizChoices.querySelectorAll('.choiceBtn');
        if(btns[n-1]) btns[n-1].click();
      }
    }
  });
  canvas.addEventListener('pointerdown', (e)=>{
    e.preventDefault();
    tryJump();
  }, { passive:false });

  startBtn.addEventListener('click', ()=>{
    startScreen.classList.add('hidden');
    hud.classList.remove('hidden');
    resetGame();
    updateHearts();
    state = 'running';
    lastTime = performance.now();
    requestAnimationFrame(loop);
  });

  restartBtn.addEventListener('click', ()=>{
    gameOverScreen.classList.add('hidden');
    hud.classList.remove('hidden');
    resetGame();
    updateHearts();
    state = 'running';
    lastTime = performance.now();
    requestAnimationFrame(loop);
  });

  // ---- quiz flow ----
  let quizCount = 0;
  function triggerQuiz(){
    state = 'quiz';
    quizCount++;
    const isWord = quizCount % 2 === 1;
    const tier = Math.min(Math.floor(distance/500), 4);
    const q = isWord ? makeWordQuiz() : makeMathQuiz(tier);
    document.getElementById('quizSub').textContent = isWord
      ? '이 뜻을 가진 영어 단어를 골라보세요!'
      : '수학 문제를 풀어보세요!';
    quizQuestion.textContent = q.question;
    quizChoices.innerHTML = '';
    q.options.forEach((opt)=>{
      const btn = document.createElement('button');
      btn.className = 'choiceBtn';
      btn.textContent = opt;
      btn.addEventListener('click', ()=>{
        const buttons = quizChoices.querySelectorAll('.choiceBtn');
        buttons.forEach(b=>b.disabled = true);
        if(opt === q.answer){
          btn.classList.add('correct');
          showToast('정답이에요! 🎉', 900);
          distance += 20;
          setTimeout(closeQuiz, 700);
        } else {
          btn.classList.add('wrong');
          buttons.forEach(b=>{ if(b.textContent === q.answer) b.classList.add('correct'); });
          showToast('괜찮아요, 다음엔 맞출 수 있어요!', 1300);
          setTimeout(closeQuiz, 1300);
        }
      });
      quizChoices.appendChild(btn);
    });
    quizOverlay.classList.remove('hidden');
  }

  function closeQuiz(){
    quizOverlay.classList.add('hidden');
    nextQuizAt = distance + 260 + Math.random()*80;
    invincibleTimer = 1.2;
    state = 'running';
  }

  // ---- collision ----
  function checkCollision(o){
    const px = player.x, py = player.y - player.h, pw = player.w, ph = player.h;
    const pad = 8;
    return (px+pad) < (o.x+o.w) && (px+pw-pad) > o.x &&
           (py+pad) < (o.y+o.h) && (py+ph-pad) > o.y;
  }

  function onHit(){
    if(invincibleTimer > 0) return;
    lives--;
    updateHearts();
    invincibleTimer = 1.5;
    if(lives <= 0){
      endGame();
    } else {
      showToast('아야! 조심해요!', 900);
    }
  }

  function endGame(){
    state = 'gameover';
    hud.classList.add('hidden');
    const finalDist = Math.floor(distance);
    if(finalDist > best){
      best = finalDist;
      localStorage.setItem('runnerBest', String(best));
    }
    finalScoreEl.textContent = finalDist;
    bestScoreEl.textContent = best;
    gameOverScreen.classList.remove('hidden');
  }

  // ---- obstacle spawn ----
  const OBSTACLE_TYPES = [
    { emoji:'🌵', w:40, h:56 },
    { emoji:'🪨', w:46, h:40 },
    { emoji:'🦴', w:44, h:26 },
    { emoji:'🧱', w:40, h:40 },
  ];
  function spawnObstacle(){
    const t = OBSTACLE_TYPES[Math.floor(Math.random()*OBSTACLE_TYPES.length)];
    obstacles.push({
      x: BASE_W + 20,
      y: GROUND_Y - t.h,
      w: t.w, h: t.h,
      emoji: t.emoji,
      passed:false
    });
  }

  // ---- draw ----
  let groundScroll = 0;
  function draw(){
    ctx.clearRect(0,0,BASE_W,BASE_H);

    // sky gradient already via CSS bg, draw sun + clouds
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    [[120,70,26],[210,50,18],[700,60,22],[780,90,16]].forEach(([cx,cy,r])=>{
      ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx+r*0.8,cy+6,r*0.7,0,Math.PI*2); ctx.fill();
    });

    // ground
    ctx.fillStyle = '#8bc34a';
    ctx.fillRect(0, GROUND_Y, BASE_W, BASE_H-GROUND_Y);
    ctx.fillStyle = '#6fa83a';
    ctx.fillRect(0, GROUND_Y, BASE_W, 10);
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 4;
    ctx.setLineDash([24,20]);
    ctx.beginPath();
    ctx.moveTo(-groundScroll % 44, GROUND_Y+40);
    ctx.lineTo(BASE_W, GROUND_Y+40);
    ctx.stroke();
    ctx.setLineDash([]);

    // player
    ctx.save();
    if(invincibleTimer > 0 && Math.floor(invincibleTimer*10)%2===0){
      ctx.globalAlpha = 0.4;
    }
    ctx.font = '54px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillText('🏃', player.x + player.w/2, player.y);
    ctx.restore();

    // obstacles
    ctx.font = '46px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    obstacles.forEach(o=>{
      ctx.fillText(o.emoji, o.x + o.w/2, o.y + o.h + 6);
    });
  }

  // ---- main loop ----
  function loop(now){
    const dt = Math.min((now - lastTime)/1000, 0.033);
    lastTime = now;

    if(state === 'running'){
      // physics
      player.vy += GRAVITY*dt;
      player.y += player.vy*dt;
      if(player.y >= GROUND_Y){
        player.y = GROUND_Y;
        player.vy = 0;
        player.onGround = true;
      }

      // speed ramp
      speed = 320 + Math.min(distance/8, 260);
      distance += speed*dt/10;
      groundScroll += speed*dt;

      // spawn
      spawnTimer -= dt*1000;
      if(spawnTimer <= 0){
        spawnObstacle();
        spawnTimer = randSpawnGap() * (1 - Math.min(distance/4000,0.4));
      }

      // move obstacles
      obstacles.forEach(o=> o.x -= speed*dt);
      obstacles = obstacles.filter(o=> o.x + o.w > -20);

      if(invincibleTimer > 0) invincibleTimer -= dt;

      // collisions
      if(invincibleTimer <= 0){
        for(const o of obstacles){
          if(checkCollision(o)){
            onHit();
            break;
          }
        }
      }

      scoreVal.textContent = Math.floor(distance);

      if(distance >= nextQuizAt && state === 'running'){
        triggerQuiz();
      }
    }

    draw();

    if(state !== 'gameover'){
      requestAnimationFrame(loop);
    }
  }

  // initial idle draw
  player = { x:110, y:GROUND_Y, w:46, h:56, vy:0, onGround:true };
  obstacles = [];
  draw();
})();
</script>
</body>
</html>
